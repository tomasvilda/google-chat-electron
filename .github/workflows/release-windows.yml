name: release-windows

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  release-windows:
    name: release-windows
    runs-on: windows-2025
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install pnpm
        run: npm install -g pnpm@^10

      - name: Install dependencies
        run: pnpm install 

      - name: Pack for Windows
        run: npm run pack:windows

      - name: Download inno-setup installer
        working-directory: ./windows
        run: curl.exe --max-time 30 --retry 3 -L -o ./innosetup.exe https://github.com/jrsoftware/issrc/releases/download/is-6_2_0/innosetup-6.2.0.exe

      - name: Install inno-setup silently
        working-directory: ./windows
        run: ./innosetup.exe /SP- /VERYSILENT /SUPPRESSMSGBOXES /NORESTART /NOCANCEL

      - name: Create installer
        run: npm run build:windows

      - name: Upload binaries to GitHub release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: './dist/installers/*.*'
          tag: ${{ github.ref }}
          file_glob: true
